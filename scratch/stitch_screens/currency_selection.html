<style>

            -webkit-tap-highlight-color: transparent;

            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);

<main class="w-full max-w-2xl px-container-padding flex-1 mb-20">

</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl focus:ring-2 focus:ring-primary text-body-lg placeholder-outline" placeholder="Search currency..." type="text"/>
</div>
<!-- Section Title -->
<div class="mb-stack-sm px-1">
<p class="font-label-caps text-label-caps text-outline uppercase tracking-wider">All Currencies</p>
</div>
<!-- Currency List Stack -->
<div class="flex flex-col gap-3">
<!-- PKR (Active State) -->

<div class="w-12 h-12 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container font-bold text-lg">

<div>

</div>
</div>
<div class="flex items-center gap-2">
<span class="font-label-caps text-label-caps text-primary mr-2">PKR</span>

</button>

<div>

</div>

<div>

<button class="w-full bg-primary text-on-primary font-title-md text-title-md py-4 rounded-xl shadow-lg hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all">
            Confirm Selection
        </button>

<!-- Hidden BottomNavBar logic for Top-Level consistency check -->
<!-- Suppression rule applied: this is a sub-page/task-focused screen with a back action -->
<script>
        // Simple micro-interaction for currency selection
        document.querySelectorAll('.currency-card').forEach(card => {
            card.addEventListener('click', function() {
                // Remove active state from all
                document.querySelectorAll('.currency-card').forEach(c => {
                    c.classList.remove('border-primary', 'shadow-sm', 'ring-1', 'ring-primary/10');
                    c.classList.add('border-outline-variant');
                    const iconDiv = c.querySelector('div:last-child');
                    const existingCheck = iconDiv.querySelector('.material-symbols-outlined');
                    if (existingCheck) existingCheck.remove();
                });

                // Add active state to clicked
                this.classList.add('border-primary', 'shadow-sm', 'ring-1', 'ring-primary/10');
                this.classList.remove('border-outline-variant');
                
                const lastDiv = this.querySelector('div:last-child');
                const check = document.createElement('span');
                check.className = 'material-symbols-outlined text-primary';
                check.style.fontVariationSettings = "'FILL' 1";
                check.textContent = 'check_circle';
                lastDiv.appendChild(check);
            });
        });
    </script>
