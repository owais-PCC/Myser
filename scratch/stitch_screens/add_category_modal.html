<!DOCTYPE html>

<html lang="en" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Category - FinTech UI</title>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS CDN with Plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              500: '#10b981',
              600: '#059669',
              700: '#047857',
            },
            surface: {
              50: '#f9fafb',
              100: '#f3f4f6',
              200: '#e5e7eb',
              800: '#1f2937',
              900: '#111827',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-200 font-sans antialiased">
<!-- BEGIN: Page Background (Log Expense Mockup) -->
<div class="fixed inset-0 bg-slate-400 flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white rounded-3xl shadow-2xl overflow-hidden opacity-50 select-none">
<div class="p-6">
<div class="flex items-center mb-6">
<div class="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center mr-4">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div>
<h1 class="text-2xl font-bold text-slate-900">Log Expense</h1>
<p class="text-slate-500 text-sm">Saturday, June 20</p>
</div>
</div>
<div class="bg-slate-50 rounded-2xl p-8 mb-6 text-center">
<span class="text-slate-400 text-xl font-semibold mr-2">Rs</span>
<span class="text-6xl font-bold text-slate-900">0</span>
</div>
</div>
</div>
</div>
<!-- END: Page Background -->
<!-- BEGIN: Modal Overlay -->
<div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center z-50">
<!-- BEGIN: Add Category Modal -->
<main class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 pb-10 shadow-2xl animate-in slide-in-from-bottom duration-300" data-purpose="add-category-modal">
<!-- Modal Header -->
<div class="flex justify-between items-center mb-8">
<h2 class="text-xl font-bold text-slate-900">Add Category</h2>
<button class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
</div>
<!-- Form Section: Name -->
<div class="mb-8" data-purpose="form-section-name">
<label class="block text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-2 ml-1">Name</label>
<input class="w-full h-14 bg-white border-2 rounded-2xl px-5 text-slate-900 placeholder:text-slate-400 focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition-all font-medium" placeholder="e.g. Groceries" type="text"/>
</div>
<!-- Form Section: Icon Selection -->
<div class="mb-8" data-purpose="form-section-icons">
<label class="block text-[10px] font-bold text-slate-400 tracking-widest uppercase mb-3 ml-1">Icon</label>
<div class="grid grid-cols-8 gap-3">
<!-- Active Icon -->
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-900 border-2 border-slate-900 text-white">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<!-- Other Icons (Monochrome Line Art) -->
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
<button class="aspect-square flex items-center justify-center rounded-xl bg-slate-50 border-2 border-transparent text-slate-400 hover:border-slate-200">
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
</button>
</div>
</div>
<!-- Preview Section -->
<div class="flex items-center mb-10 p-4 bg-slate-50 rounded-2xl border border-slate-100" data-purpose="category-preview">
<div class="w-12 h-12 rounded-xl bg-slate-900 text-white flex items-center justify-center mr-4">
<svg class="w-7 h-7" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<span class="text-lg font-semibold text-slate-800">Preview</span>
</div>
<!-- Action Button -->
<button class="w-full py-5 text-white font-bold rounded-2xl shadow-lg shadow-emerald-500/10 active:scale-[0.98] transition-all tracking-wide bg-brand-500 hover:bg-brand-600" data-purpose="submit-button">
        Add Category
      </button>
</main>
<!-- END: Add Category Modal -->
</div>
<!-- END: Modal Overlay -->
<!-- BEGIN: Custom Logic Styling -->
<style data-purpose="modal-animations">
    @keyframes slideInUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .animate-in {
      animation: slideInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
<!-- END: Custom Logic Styling -->
</body></html>
