<script>
        // Numpad logic
        const display = document.getElementById('amount-display');
        let currentAmount = "0";

        document.querySelectorAll('.numpad-key').forEach(button => {
            button.addEventListener('click', () => {
                const val = button.getAttribute('data-val');
                
                if (val === 'back') {
                    currentAmount = currentAmount.slice(0, -1);
                    if (currentAmount === "") currentAmount = "0";
                } else if (val === '.') {
                    if (!currentAmount.includes('.')) {
                        currentAmount += '.';
                    }
                } else {
                    if (currentAmount === "0") {
                        currentAmount = val;
                    } else {
                        // Prevent too many decimals
                        const decimalPart = currentAmount.split('.')[1];
                        if (decimalPart && decimalPart.length >= 2) return;
                        currentAmount += val;
                    }
                }
                
                // Format with commas for large numbers if no decimal
                if (!currentAmount.includes('.')) {
                    const formatted = parseInt(currentAmount).toLocaleString();
                    display.innerText = formatted;
                } else {
                    display.innerText = currentAmount;
                }
            });
        });

        // Category Selection logic
        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Clear previous selection
                document.querySelectorAll('.category-btn').forEach(b => {
                    b.classList.remove('border-primary', 'bg-primary-container/10');
                    b.classList.add('border-transparent', 'bg-surface-container-lowest');
                    const iconBox = b.querySelector('div');
                    iconBox.classList.remove('bg-primary', 'text-on-primary');
                    iconBox.classList.add('bg-surface-container-high', 'text-on-surface');
                    const label = b.querySelector('span:last-child');
                    label.classList.remove('text-primary');
                    label.classList.add('text-on-surface-variant');
                });

                // Set new selection
                btn.classList.add('border-primary', 'bg-primary-container/10');
                btn.classList.remove('border-transparent', 'bg-surface-container-lowest');
                const iconBox = btn.querySelector('div');
                iconBox.classList.add('bg-primary', 'text-on-primary');
                iconBox.classList.remove('bg-surface-container-high', 'text-on-surface');
                const label = btn.querySelector('span:last-child');
                label.classList.add('text-primary');
                label.classList.remove('text-on-surface-variant');
            });
        });

        // Micro-interaction for feedback
        document.addEventListener('click', (e) => {
            if (e.target.closest('button')) {
                const btn = e.target.closest('button');
                btn.classList.add('active:scale-95');
                setTimeout(() => btn.classList.remove('active:scale-95'), 150);
            }
        });
    </script>
