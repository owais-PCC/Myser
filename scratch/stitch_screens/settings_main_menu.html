<script>
        // Micro-interaction for list items
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                const chevron = btn.querySelector('.material-symbols-outlined:last-child');
                if (chevron && chevron.innerText === 'chevron_right') {
                    chevron.style.transform = 'translateX(4px)';
                    chevron.style.transition = 'transform 0.2s ease-out';
                }
            });
            btn.addEventListener('mouseleave', () => {
                const chevron = btn.querySelector('.material-symbols-outlined:last-child');
                if (chevron && chevron.innerText === 'chevron_right') {
                    chevron.style.transform = 'translateX(0px)';
                }
            });
        });
    </script>
